<!DOCTYPE html>
<html>
<head>
    <script>
        // The same Gist URL you used in Android Studio
        const KILL_SWITCH_URL = "https://gist.githubusercontent.com/Damian25Ty/a3dcca011e0a42b3079c26b14a2e8318/raw/Terminat.txt";

        async function checkKillSwitch() {
            try {
                const response = await fetch(KILL_SWITCH_URL + "?t=" + Date.now());
                const status = await response.text();
                if (status.trim().toUpperCase() === "TERMINATE") {
                    document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:100px;'>This service has been terminated.</h1>";
                    window.location.href = "about:blank"; // Or redirect them away
                }
            } catch (e) {
                console.error("Kill switch check failed", e);
            }
        }
        checkKillSwitch();
    </script>
    <meta charset="utf-8">
    <title>Student Result Portal</title>

    <style>
        body{
            font-family: Arial;
            padding: 20px;
        }
        h2{
            text-align:center;
        }
        input{
            width:100%;
            padding:12px;
            font-size:16px;
            margin-bottom:12px;
        }
        button{
            width:100%;
            padding:12px;
            font-size:18px;
            background:green;
            color:white;
            border:none;
        }
    </style>

</head>

<body>

<h2>Student Result Portal</h2>

<input type="text" id="name" placeholder="Enter Student Name">
<input type="text" id="code" placeholder="Enter Passcode">

<button onclick="checkResult()">CHECK RESULT</button>

<script>

    function checkResult(){

        let name = document.getElementById("name").value.trim();
        let code = document.getElementById("code").value.trim();

        if(name === "" || code === ""){
            alert("Enter both name and passcode");
            return;
        }

        Android.verifyStudent(name, code);
    }

</script>

</body>
</html>
