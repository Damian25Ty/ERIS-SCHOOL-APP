<!DOCTYPE html>
<html>
<head>
    <script>
        // The same Gist URL you used in Android Studio
        const KILL_SWITCH_URL = "https://gist.githubusercontent.com/Damian25Ty/a3dcca011e0a42b3079c26b14a2e8318/raw/Terminat.txt";

        async function checkKillSwitch() {
            try {
                const response = await fetch(KILL_SWITCH_URL + "?t=" + Date.now());
                const status = await response.text();
                if (status.trim().toUpperCase() === "TERMINATE") {
                    document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:100px;'>This service has been terminated.</h1>";
                    window.location.href = "about:blank"; // Or redirect them away
                }
            } catch (e) {
                console.error("Kill switch check failed", e);
            }
        }
        checkKillSwitch();
    </script>
    <meta charset="utf-8">
    <title>Student Result Portal</title>

    <style>
        body{
            font-family: Arial;
            padding: 20px;
        }
        h2{
            text-align:center;
        }
        input{
            width:100%;
            padding:12px;
            font-size:16px;
            margin-bottom:12px;
        }
        button{
            width:100%;
            padding:12px;
            font-size:18px;
            background:green;
            color:white;
            border:none;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        #statusText {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }
        #countdownText {
            color: #d32f2f;
            display: none;
        }
        #loadingText {
            color: #2e7d32;
            display: none;
        }
    </style>

</head>

<body>

<h2>Student Result Portal</h2>

<input type="text" id="name" placeholder="Enter Student Name">
<input type="text" id="code" placeholder="Enter Passcode">

<button id="checkBtn" onclick="checkResult()">CHECK RESULT</button>

<div id="statusText">
    <p id="loadingText">Connecting to server... Please wait.</p>
    <p id="countdownText">Please wait <span id="seconds">60</span> seconds before next try...</p>
</div>

<script>
    let canClick = true;

    function checkResult(){
        if (!canClick) return;

        let name = document.getElementById("name").value.trim();
        let code = document.getElementById("code").value.trim();

        if(name === "" || code === ""){
            alert("Enter both name and passcode");
            return;
        }

        startCooldown(name, code);
    }

    function startCooldown(name, code) {
        canClick = false;
        const btn = document.getElementById("checkBtn");
        const cdText = document.getElementById("countdownText");
        const ldText = document.getElementById("loadingText");
        const secSpan = document.getElementById("seconds");
        
        btn.disabled = true;
        btn.innerText = "PROCESSING...";
        ldText.style.display = "block";
        
        // STAGGER LOGIC: Wait a random 1-5 seconds before calling Android
        // This prevents "Traffic Jams" if 10+ people click at once.
        let staggerTime = Math.floor(Math.random() * 4000) + 1000; 

        setTimeout(() => {
            Android.verifyStudent(name, code);
            ldText.style.display = "none";
            cdText.style.display = "block";
            btn.innerText = "CHECK RESULT";
        }, staggerTime);

        // 60-second cooldown timer
        let timeLeft = 60;
        secSpan.innerText = timeLeft;

        const timer = setInterval(() => {
            timeLeft--;
            secSpan.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                canClick = true;
                btn.disabled = false;
                cdText.style.display = "none";
            }
        }, 1000);
    }
</script>

</body>
</html>
