<!DOCTYPE html>
<html>
<head>
    <script>
        // The same Gist URL you used in Android Studio
        const KILL_SWITCH_URL = "https://gist.githubusercontent.com/Damian25Ty/a3dcca011e0a42b3079c26b14a2e8318/raw/Terminat.txt";

        async function checkKillSwitch() {
            try {
                const response = await fetch(KILL_SWITCH_URL + "?t=" + Date.now());
                const status = await response.text();
                if (status.trim().toUpperCase() === "TERMINATE") {
                    document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:100px;'>This service has been terminated.</h1>";
                    window.location.href = "about:blank"; // Or redirect them away
                }
            } catch (e) {
                console.error("Kill switch check failed", e);
            }
        }
        checkKillSwitch();
    </script>
    <meta charset="utf-8">
    <title>Student Login</title>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        h2 { color: #333; }
        .login-container {
            max-width: 300px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background: #28a745; 
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Student Login</h2>
        <input id="studentName" placeholder="Enter Full Name">
        <input id="passcode" type="password" placeholder="Enter Passcode">
        <button onclick="performLogin()">CHECK RESULT</button>
    </div>

    <script>
        const API_KEY = "$2a$10$N28mNlGJm6I/gycmgCJJUOY0I1lZvywRLg1A70hnKaHclYiM6bHC.";
        const BIN_PRIMARY = "69a08ed7d0ea881f40dc82ff";
        const BIN_HIGH = "69af0b88ae596e708f71b09c";

        async function performLogin(){
            let name = document.getElementById("studentName").value.trim();
            let code = document.getElementById("passcode").value.trim();

            if (!name || !code) {
                alert("Please enter both name and passcode.");
                return;
            }

            try {
                // Check Primary database
                let result = await checkDatabase(BIN_PRIMARY, name, code);
                
                // If not found, check High School database
                if (!result) {
                    result = await checkDatabase(BIN_HIGH, name, code);
                }

                if (result) {
                    // IF IN APP: Use the viewUrl helper we added to Java
                    if (typeof Android !== "undefined" && Android.viewUrl) {
                        Android.viewUrl(result);
                    } else {
                        // IF ON WEB: Use standard window.open
                        window.open(result, '_blank');
                    }
                } else {
                    alert("Invalid name or passcode.");
                }

            } catch (e) {
                alert("Connection error. Check your internet.");
            }
        }

        async function checkDatabase(binId, name, code) {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
                method: 'GET',
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await response.json();
            const record = data.record;

            if (record[name]) {
                const parts = record[name].split("|");
                if (parts[0] === code) {
                    return parts[1]; // The PDF URL
                }
            }
            return null;
        }
    </script>
</body>
</html>
